# Minipass VPS — nginx proxy cache + compression
# Included in http{} context by nginx-proxy via /etc/nginx/conf.d/cache.conf
#
# proxy_cache_path breakdown:
#   levels=1:2      → two-level directory hierarchy (avoids huge flat dirs)
#   keys_zone=50m   → 50MB shared memory for cache key index (~400k keys)
#   max_size=2g     → max disk consumed by cache; nginx auto-evicts when full
#   inactive=60m    → evict entries not accessed within 60 minutes
#   use_temp_path=off → write directly to cache dir (one fewer copy per response)

proxy_cache_path /var/cache/nginx/proxy
    levels=1:2
    keys_zone=minipass_cache:50m
    max_size=2g
    inactive=60m
    use_temp_path=off;

# Global compression — applied to all proxied responses
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/xml+rss
    application/json
    application/xml
    image/svg+xml
    text/html;
